name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npx tsc --noEmit

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npx eslint app/frontend/ --ext .ts,.tsx,.js,.jsx

  openapi-drift:
    name: OpenAPI spec up to date
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
    env:
      RAILS_ENV: test
      PGHOST: localhost
      PGUSER: postgres
      PGPASSWORD: postgres
      RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3.10'
          bundler-cache: true
      - name: Prepare database
        run: bin/rails db:prepare
      - name: Record OpenAPI spec from the integration suite
        # Spec-freshness gate, not a test-correctness gate: the spec is recorded for
        # every request regardless of pass/fail, and only /api/v1 paths are kept. The
        # `git diff` below is the actual gate.
        run: OPENAPI=1 bin/rails test test/integration || true
      - name: Split into per-domain slices
        run: bin/rails openapi:split
      - name: Fail if the committed spec is out of date
        run: |
          if ! git diff --exit-code -- doc/openapi; then
            echo "::error::OpenAPI spec is out of date. Regenerate and commit:"
            echo "  OPENAPI=1 bin/rails test test/integration && bin/rails openapi:split"
            exit 1
          fi

  notify-failure:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: [typecheck, lint, openapi-drift]
    if: failure()
    steps:
      - name: Notify Beebopelula via Telegram
        run: |
          FAILED_JOBS=""
          if [ "${{ needs.typecheck.result }}" = "failure" ]; then FAILED_JOBS="TypeScript"; fi
          if [ "${{ needs.lint.result }}" = "failure" ]; then FAILED_JOBS="$FAILED_JOBS ESLint"; fi
          if [ "${{ needs.openapi-drift.result }}" = "failure" ]; then FAILED_JOBS="$FAILED_JOBS OpenAPI"; fi
          MESSAGE="⚠️ CI failed on Terranova (${GITHUB_REF_NAME}): ${FAILED_JOBS}%0ACommit: ${GITHUB_SHA::8} by ${GITHUB_ACTOR}%0A${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="$MESSAGE" \
            -d parse_mode=HTML
