name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - run: yarn tsc --noEmit

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - run: yarn eslint app/frontend/ --ext .ts,.tsx,.js,.jsx

  openapi-drift:
    name: OpenAPI spec up to date
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
    env:
      RAILS_ENV: test
      PGHOST: localhost
      PGUSER: postgres
      PGPASSWORD: postgres
      RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3.10'
          bundler-cache: true
      - name: Prepare test database
        # Loads the schema into the test DB without running seeds (db:prepare would
        # seed, and seeds are not needed — tests build their own data).
        run: bin/rails db:test:prepare
      - name: Record OpenAPI spec from the integration suite
        # Spec-freshness gate, not a test-correctness gate: the spec is recorded for
        # every request regardless of pass/fail, and only /api/v1 paths are kept. The
        # `git diff` below is the actual gate.
        run: OPENAPI=1 bin/rails test test/integration || true
      - name: Split into per-domain slices
        run: bin/rails openapi:split
      - name: Report if the committed spec is out of date (non-blocking)
        # Informatif, non bloquant : la régénération rspec-openapi n'est pas déterministe
        # d'un run à l'autre (ordre des tableaux `required`, sérialisation), donc un
        # `git diff` strict produit des faux positifs récurrents — il signale même des
        # domaines non modifiés. On affiche la dérive mais on ne bloque plus le merge.
        # À durcir si la génération est rendue déterministe (tri stable / diff sémantique).
        continue-on-error: true
        run: |
          if ! git diff --exit-code -- doc/openapi; then
            echo "::warning::OpenAPI spec diffère du spec régénéré (gate non bloquant). Pour réaligner : OPENAPI=1 bin/rails test test/integration && bin/rails openapi:split"
          fi
